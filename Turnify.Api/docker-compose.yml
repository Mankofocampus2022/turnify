# 🛡️ AJUSTE SENIOR: Eliminamos 'version' porque ya es obsoleta en Docker Compose moderno
services:
  turnify-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: turnify-db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Turnify.Master.2026!*
    ports:
      - "1433:1433"
    volumes:
      - ./sql_data:/var/opt/mssql/data
    networks:
      - turnify-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Turnify.Master.2026!*' -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  turnify-api:
    build: .
    container_name: turnify-api
    restart: always
    ports:
      - "5000:8080"
    volumes:
      # 🛡️ CORRECCIÓN CRÍTICA: Mapeamos el CONTENIDO de dist directamente a /app/frontend
      # Antes tenías /app/frontend/dist y eso creaba una subcarpeta innecesaria
      - ./frontend/dist:/app/frontend
    environment:
      - ConnectionStrings__DefaultConnection=Server=turnify-db,1433;Database=TurnifyDb;User Id=sa;Password=Turnify.Master.2026!*;TrustServerCertificate=True;Encrypt=True;
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      turnify-db:
        condition: service_healthy
    networks:
      - turnify-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  turnify-network:
    driver: bridge