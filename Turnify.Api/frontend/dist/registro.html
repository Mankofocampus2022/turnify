<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Turnify | Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css-registro.css?v=2.0">
</head>

<body>

<div class="register-wrapper">
  
  <div class="register-card">

    <div class="register-header">
      <h2>Crear cuenta</h2>
      <p>Regístrate para reservar citas fácilmente</p>
    </div>

    <form class="form-grid" action="cliente-reserva.html" method="get">

      <div class="input-group full-width">
        <label>Nombre completo</label>
        <input type="text" placeholder="Tu nombre" required>
      </div>

      <div class="input-group full-width">
        <label>Correo electrónico</label>
        <input type="email" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="input-group full-width">
        <label>Teléfono</label>
        <input type="tel" placeholder="3001234567" required>
      </div>

      <div class="input-group full-width">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="input-group full-width">
        <label>Confirmar contraseña</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="input-group full-width">
        <button type="submit" class="btn-register">Crear cuenta</button>
      </div>

    </form>

    <div class="register-footer">
      <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </div>

  </div>
</div>

</body>
</html>
