<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnify | Registro de proveedor</title>
  <link rel="stylesheet" href="css-styles.css">
</head>

<body>

<div class="page">
  <div class="container">
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <h1>Turnify</h1>
        <p>Registro de barberos y manicuristas</p>
      </div>

      <!-- FORMULARIO -->
      <form>
        <div class="form-grid">

         <!-- TIPO DE PROVEEDOR -->
            <div class="field full">
            <label>¿Cómo trabajas?</label>

            <div class="provider-toggle">
                <button type="button" class="provider-btn active" data-type="negocio">
                Tengo negocio
                </button>

                <button type="button" class="provider-btn" data-type="independiente">
                Soy independiente
                </button>
            </div>

            <input type="hidden" id="tipoProveedor" value="negocio">
            </div>


          <!-- ===============================
               DATOS DEL NEGOCIO
          =============================== -->
          <!-- DATOS NEGOCIO -->
            <div class="provider-section" id="section-negocio">

            <div class="field full">
                <label>Nombre del negocio</label>
                <input type="text" placeholder="Ej: Barbería El Corte">
            </div>

            <div class="field">
                <label>Tipo de negocio</label>
                <select>
                <option>Barbería</option>
                <option>Spa de uñas</option>
                </select>
            </div>

            </div>

            <!-- DATOS INDEPENDIENTE -->
            <div class="provider-section hidden" id="section-independiente">

            <div class="field full">
                <label>Nombre profesional</label>
                <input type="text" placeholder="Ej: Juan Pérez">
            </div>

            <div class="field">
                <label>Profesión</label>
                <select>
                <option>Barbero</option>
                <option>Manicurista</option>
                </select>
            </div>

            </div>

          <!-- ===============================
               DATOS DEL INDEPENDIENTE
          =============================== -->
          <div class="field">
            <label>Profesión</label>
            <select>
              <option value="">Selecciona</option>
              <option>Barbero</option>
              <option>Manicurista</option>
            </select>
          </div>

          <!-- ===============================
               MODALIDAD DE ATENCIÓN
          =============================== -->
          <div class="field">
            <label>Modalidad de atención</label>
            <select>
              <option value="">Selecciona</option>
              <option>En local</option>
              <option>A domicilio</option>
              <option>Ambas</option>
            </select>
          </div>

          <!-- ===============================
               UBICACIÓN
          =============================== -->
          <div class="field">
            <label>Ciudad</label>
            <input type="text" placeholder="Ej: Bogotá">
          </div>

          <div class="field">
            <label>Zona de atención</label>
            <input type="text" placeholder="Ej: Norte, Sur, Centro">
          </div>

          <div class="field full">
            <label>Dirección / Ubicación</label>
            <input type="text" placeholder="Ej: Calle 10 #20-30">
          </div>

          <div class="field full">
            <label>Referencia del lugar</label>
            <input type="text" placeholder="Ej: Frente al parque principal">
          </div>

          <!-- Preparado para mapas (futuro) -->
          <input type="hidden" id="latitud">
          <input type="hidden" id="longitud">

          <!-- ===============================
               DATOS DE CONTACTO
          =============================== -->
          <div class="field">
            <label>Nombre del responsable</label>
            <input type="text" placeholder="Nombre completo">
          </div>

          <div class="field">
            <label>Teléfono</label>
            <input type="tel" placeholder="3001234567">
          </div>

          <div class="field full">
            <label>Correo electrónico</label>
            <input type="email" placeholder="correo@ejemplo.com">
          </div>

          <!-- ===============================
               SEGURIDAD
          =============================== -->
          <div class="field full">
            <label>Foto de identificación (opcional)</label>
            <input type="file" accept="image/*">
          </div>

          <!-- BOTÓN -->
          <div class="field full">
            <button type="button">Guardar información</button>
          </div>

        </div>
      </form>

      <!-- FOOTER -->
      <div class="footer">
        <small>© 2026 Turnify</small>
      </div>

    </div>
  </div>
</div>

</body>
</html>
