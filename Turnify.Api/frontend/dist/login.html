<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turnify | Gestión de Turnos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-styles.css">
    <link rel="stylesheet" href="css-login-styles.css">
    <style>
        .alert-hidden { display: none; }
        .alert-visible { 
            background: #ff4444; color: white; padding: 10px; 
            border-radius: 5px; margin-bottom: 15px; text-align: center;
            font-size: 0.9em; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <header class="login-header">
            <h1 class="logo-text">Turnify</h1>
            <p>Acceso Profesional al Sistema</p>
        </header>

        <div id="login-alert" class="alert-hidden"></div>

        <form id="formLogin" class="login-form" onsubmit="return false;">
            <div class="input-group">
                <label for="userType">Rol de Usuario</label>
                <select id="userType" required>
                    <option value="" disabled selected>Selecciona tu rol...</option>
                    <option value="SuperAdmin">🚀 Superadministrador</option>
                    <option value="Administrador">🛡️ Administrador</option>
                    <option value="Proveedor">🏢 Proveedor de servicios</option>
                    <option value="Clientes">👤 Cliente</option>
                </select>
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@turnify.com" autocomplete="username" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                
                <div class="forgot-password-container">
                    <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button type="submit" id="btnEntrar" class="btn-login">Entrar al Panel</button>
        </form>

        <footer class="login-footer">
            <p>¿Aún no tienes cuenta? <a href="registro.html">Crea una aquí</a></p>
        </footer>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
