<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turnify | Gestión de Turnos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-styles.css">
    <link rel="stylesheet" href="css-login-styles.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <header class="login-header">
            <h1 class="logo-text">Turnify</h1>
            <p>Acceso Profesional al Sistema</p>
        </header>

        <div class="login-form">
            <div class="input-group">
                <label for="userType">Rol de Usuario</label>
                <select id="userType">
                    <option value="">Selecciona tu rol...</option>
                    <option value="SuperAdmin">🚀 Superadministrador</option>
                    <option value="Administrador">🛡️ Administrador</option>
                    <option value="Proveedor">🏢 Proveedor de servicios</option>
                    <option value="Clientes">👤 Cliente</option>
                </select>
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@turnify.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <div class="forgot-password-container">
                    <a href="forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button id="btnEntrar" class="btn-login">Entrar al Panel</button>
        </div>

        <footer class="login-footer">
            <p>¿Aún no tienes cuenta? <a href="registro.html">Crea una aquí</a></p>
        </footer>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
