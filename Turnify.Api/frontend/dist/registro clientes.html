<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Turnify | Únete a la comunidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css-styles.css">
  <link rel="stylesheet" href="css-registro.css">
</head>
<body>

<div class="login-page">
  <div class="form-container">
    <div class="register-card">
      
      <div class="register-header">
        <div class="brand">
          <span class="logo-icon">🕒</span>
          <h1>Turnify</h1>
        </div>
        <p>Crea tu cuenta y reserva en segundos</p>
      </div>

      <div class="role-selector">
        <button type="button" class="role-btn active" id="btnSoyCliente" onclick="cambiarRol('CLIENTE')">
          <i class="fas fa-user"></i> Soy Cliente
        </button>
        <button type="button" class="role-btn" id="btnSoyBarbero" onclick="cambiarRol('BARBERO')">
          <i class="fas fa-cut"></i> Soy Profesional
        </button>
      </div>

      <form id="formRegistroCliente" class="modern-form">
        
        <div class="input-group" id="groupNegocio" style="display: none;">
          <label><i class="fas fa-store"></i> Nombre del Negocio / Salón</label>
          <input type="text" id="regNegocio" placeholder="Ej. El Olimpo / Nails & Gloss">
        </div>

        <div class="input-group" id="groupTipo" style="display: none;">
          <label><i class="fas fa-briefcase"></i> ¿A qué te dedicas?</label>
          <select id="regTipo" class="modern-select">
            <option value="Barbería">Barbería</option>
            <option value="Manicura">Manicura / Uñas</option>
            <option value="Estética">Estética / Spa</option>
          </select>
        </div>

        <div class="input-group">
          <label><i class="fas fa-user"></i> Nombre completo</label>
          <input type="text" id="regNombre" placeholder="Ej. Darwin Ocampo" required>
        </div>

        <div class="input-group">
          <label><i class="fas fa-envelope"></i> Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="darwin@ejemplo.com" required>
        </div>

        <div class="input-group">
          <label><i class="fas fa-phone"></i> Teléfono</label>
          <input type="tel" id="regTelefono" placeholder="300 123 4567" required>
        </div>

        <div class="password-row">
          <div class="input-group">
            <label><i class="fas fa-lock"></i> Contraseña</label>
            <input type="password" id="regPassword" placeholder="••••••••" required>
          </div>
          <div class="input-group">
            <label><i class="fas fa-shield-alt"></i> Confirmar</label>
            <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn-register" id="btnSubmit">
          <span id="btnText">Registrarme como Cliente</span>
          <i class="fas fa-arrow-right"></i>
        </button>

      </form>

      <div class="register-footer">
        <p>¿Ya eres parte de Turnify? <a href="login.html">Inicia sesión aquí</a></p>
      </div>

    </div>
  </div>
</div>

<script src="js/registro-clientes.js"></script>
</body>
</html>
