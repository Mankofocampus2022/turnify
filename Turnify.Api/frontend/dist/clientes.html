<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turnify | Gestión de Clientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-clientes-style.css">
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h2>Gestión de Clientes</h2>
            <div class="user-info">
                <span>Sesión: <strong id="admin-name">Administrador</strong></span>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Información del Cliente</th>
                        <th>Contacto Principal</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-clientes">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
