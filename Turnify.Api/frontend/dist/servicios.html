<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turnify - Gestión de Servicios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css-dashboard.css"> 
    <link rel="stylesheet" href="css-servicios.css"> 
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon">🕒</span>
            <h2>Turnify</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item" id="nav-resumen">
                <i class="fas fa-chart-line"></i> Resumen
            </a>
            <a href="usuarios.html" class="nav-item" id="nav-usuarios">
                <i class="fas fa-users"></i> Usuarios
            </a>
            <a href="servicios.html" class="nav-item active" id="nav-servicios">
                <i class="fas fa-cut"></i> Servicios
            </a>
            <a href="reportes.html" class="nav-item" id="nav-reportes">
                <i class="fas fa-file-invoice-dollar"></i> Reportes
            </a>
            <a href="configuracion.html" class="nav-item" id="nav-config">
                <i class="fas fa-cog"></i> Configuración
            </a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn-logout" id="btnLogout">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <div>
                <h1>Gestión de Servicios</h1>
                <p>Cortes de barbería, manicura y tratamientos.</p>
            </div>
            <button class="btn-add" onclick="abrirModal()">
                <i class="fas fa-plus"></i> Nuevo Servicio
            </button>
        </div>

        <div class="table-container card">
            <table class="turnify-table">
                <thead>
                    <tr>
                        <th>Servicio</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Duración</th>
                        <th style="text-align: center;">Estado</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaServicios">
                    </tbody>
            </table>
        </div>
    </main>
</div>

<div id="modalServicio" class="modal-overlay">
    <div class="modal-card glass-modal">
        <div class="modal-header">
            <h2><i class="fas fa-sliders-h"></i> Configurar Servicio</h2>
            <button class="btn-close" onclick="cerrarModal()">&times;</button>
        </div>
        
        <form id="formServicio" style="padding: 25px;">
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Nombre del Servicio</label>
                <input type="text" id="nombreServicio" placeholder="Ej. Corte Barba Real" required 
                       style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; outline: none;">
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Categoría</label>
                <select id="categoriaServicio" 
                        style="width: 100%; 
                            padding: 12px; 
                            border-radius: 10px; 
                            border: 1px solid rgba(72, 193, 181, 0.3); 
                            background: #122940; 
                            color: #48c1b5; 
                            font-weight: 600;
                            outline: none; 
                            cursor: pointer;
                            appearance: none; 
                            -webkit-appearance: none;">
                    <option value="Barbería" style="background: #1b3d5f; color: white;">💈 Barbería</option>
                    <option value="Manicura" style="background: #1b3d5f; color: white;">💅 Manicura / Nails</option>
                    <option value="Estética" style="background: #1b3d5f; color: white;">✨ Estética / Facial</option>
                    <option value="Otro" style="background: #1b3d5f; color: white;">➕ Otro</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Precio ($)</label>
                    <input type="number" id="precioServicio" placeholder="0" required 
                           style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                </div>
                <div style="flex: 1;">
                    <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Duración (Min)</label>
                    <input type="number" id="duracionServicio" placeholder="30" required 
                           style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Comisión %</label>
                    <input type="number" id="comisionServicio" step="0.01" value="0" 
                           style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                </div>
                <div style="flex: 1;">
                    <label style="color: #48c1b5; display: block; margin-bottom: 5px; font-weight: 600;">Estado</label>
                    <select id="estadoServicio" 
                            style="width: 100%; 
                                padding: 12px; 
                                border-radius: 10px; 
                                border: 1px solid rgba(72, 193, 181, 0.3); 
                                background: #122940; 
                                color: #48c1b5; 
                                font-weight: 600;
                                outline: none; 
                                cursor: pointer;
                                appearance: none; 
                                -webkit-appearance: none;">
                        <option value="1" style="background: #1b3d5f; color: white;">🟢 Activo</option>
                        <option value="2" style="background: #1b3d5f; color: white;">🟡 En Proceso</option>
                        <option value="0" style="background: #1b3d5f; color: white;">🔴 Inactivo</option>
                    </select>
                </div>
            </div> 
            <div style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <button type="button" onclick="cerrarModal()" 
                        style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: 600;">
                    Cancelar
                </button>
                <button type="submit" class="btn-add-lava">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>

<script src="auth-global.js"></script> <script src="js/servicios.js"></script>
</body>
</html>
